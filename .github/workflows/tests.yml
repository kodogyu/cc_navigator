name: Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  # Keep required checks available if a merge queue is enabled later.
  merge_group:
    types:
      - checks_requested

# Test jobs only need to read the checked-out source. In particular, code from
# a pull request receives no write token and no repository secrets here.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-20-04:
    name: tests (Ubuntu 20.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # GitHub retired its hosted Ubuntu 20.04 image. Run the supported baseline
    # userland in the official amd64 image, pinned to an immutable digest.
    container:
      image: ubuntu:20.04@sha256:c664f8f86ed5a386b0a340d981b8f81714e21a8b9c73f658c4bea56aa179d54a

    steps:
      # The minimal Ubuntu container has no Git or GTK/X11 test dependencies.
      # Container jobs run as root, so sudo is intentionally not used here.
      - name: Install Ubuntu 20.04 dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            python3 \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            tmux \
            xvfb \
            xauth \
            libglib2.0-bin \
            libnotify-bin \
            x11-utils

      # actions/checkout v6.0.2, pinned to its full release commit SHA.
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run test suite on Ubuntu 20.04
        # Launcher tests intentionally treat :99 as an invalid display.
        run: xvfb-run -a --server-num=100 ./run-tests

  ubuntu-24-04:
    name: tests (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      # actions/checkout v6.0.2, pinned to its full release commit SHA.
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Ubuntu 24.04 dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            tmux \
            xvfb \
            xauth \
            libglib2.0-bin \
            libnotify-bin \
            x11-utils

      - name: Run test suite on Ubuntu 24.04
        # Launcher tests intentionally treat :99 as an invalid display.
        run: xvfb-run -a --server-num=100 ./run-tests
