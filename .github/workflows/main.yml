  name: CI

  on:
    pull_request:
      branches: [master]
    push:
      branches: [master]

  permissions:
    contents: read

  concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    tests:
      runs-on: ubuntu-20.04
      timeout-minutes: 15

      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false

        - name: Install system dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y \
              python3-gi \
              python3-gi-cairo \
              gir1.2-gtk-3.0 \
              tmux \
              xvfb \
              x11-utils \
              libnotify-bin

        - name: Run tests
          run: xvfb-run -a ./run-tests
